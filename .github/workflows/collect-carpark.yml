name: Collect HDB Carpark Snapshot

on:
  workflow_dispatch:

  schedule:
    # Singapore 08:47 = UTC 00:17
    - cron: "47 0 * * *"
  
    # Singapore 12:23 = UTC 04:23
    - cron: "23 4 * * *"
  
    # Singapore 18:29 = UTC 10:29
    - cron: "29 10 * * *"
  
    # Singapore 22:37 = UTC 14:37
    - cron: "37 14 * * *"
    
permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run carpark collector
        run: python collect_carpark_snapshot.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/ outputs/

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add carpark snapshot"
            git push
          fi
